<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circ"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#circ)">
    <!-- mint green background -->
    <rect width="200" height="200" fill="#F0FDF4"/>
    <!-- shoulders / top (purple) -->
    <path d="M30 200 Q36 152 100 146 Q164 152 170 200Z" fill="#8B5CF6"/>
    <!-- bright collar stripe -->
    <path d="M84 150 L100 163 L116 150" fill="white" opacity="0.35"/>
    <!-- neck -->
    <rect x="89" y="138" width="22" height="17" rx="8" fill="#6B3B1A"/>
    <!-- head (face) -->
    <ellipse cx="100" cy="102" rx="42" ry="48" fill="#6B3B1A"/>
    <!-- natural hair — large afro base -->
    <circle cx="100" cy="76" r="50" fill="#150800"/>
    <!-- afro puff details (overlapping circles for texture) -->
    <circle cx="72" cy="62" r="18" fill="#150800"/>
    <circle cx="128" cy="62" r="18" fill="#150800"/>
    <circle cx="100" cy="48" r="20" fill="#150800"/>
    <circle cx="58" cy="78" r="16" fill="#150800"/>
    <circle cx="142" cy="78" r="16" fill="#150800"/>
    <circle cx="84" cy="52" r="14" fill="#150800"/>
    <circle cx="116" cy="52" r="14" fill="#150800"/>
    <!-- slight highlight for dimension -->
    <circle cx="86" cy="58" r="7" fill="#2A1200" opacity="0.6"/>
    <circle cx="114" cy="55" r="6" fill="#2A1200" opacity="0.6"/>
    <circle cx="100" cy="44" r="8" fill="#2A1200" opacity="0.5"/>
    <!-- face visible area -->
    <ellipse cx="100" cy="106" rx="37" ry="42" fill="#6B3B1A"/>
    <!-- eyes (expressive, bright) -->
    <ellipse cx="85" cy="100" rx="7.5" ry="7" fill="white"/>
    <ellipse cx="115" cy="100" rx="7.5" ry="7" fill="white"/>
    <circle cx="85" cy="100" r="4.5" fill="#150800"/>
    <circle cx="115" cy="100" r="4.5" fill="#150800"/>
    <circle cx="86.5" cy="98.5" r="1.5" fill="white"/>
    <circle cx="116.5" cy="98.5" r="1.5" fill="white"/>
    <!-- eyebrows (full, expressive) -->
    <path d="M78 91 Q85 88 92 90" stroke="#150800" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M108 90 Q115 88 122 91" stroke="#150800" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- nose (natural) -->
    <path d="M96 108 Q93 116 96 118 Q100 120 104 118 Q107 116 104 108" stroke="#4A2810" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- nostrils subtle -->
    <ellipse cx="95" cy="117" rx="3.5" ry="2" fill="#4A2810" opacity="0.4"/>
    <ellipse cx="105" cy="117" rx="3.5" ry="2" fill="#4A2810" opacity="0.4"/>
    <!-- big cheerful smile -->
    <path d="M84 128 Q100 142 116 128" stroke="#4A2810" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- teeth (bright) -->
    <path d="M86 129 Q100 136 114 129 Q100 140 86 129Z" fill="white" opacity="0.92"/>
    <!-- blush (very subtle on deep skin) -->
    <ellipse cx="76" cy="118" rx="9" ry="5" fill="#FF7050" opacity="0.15"/>
    <ellipse cx="124" cy="118" rx="9" ry="5" fill="#FF7050" opacity="0.15"/>
    <!-- gold hoop earrings -->
    <circle cx="56" cy="113" r="7" fill="none" stroke="#F59E0B" stroke-width="3"/>
    <circle cx="144" cy="113" r="7" fill="none" stroke="#F59E0B" stroke-width="3"/>
  </g>
</svg>
